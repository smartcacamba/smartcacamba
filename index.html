<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartCaçamba - Painel Operacional</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #1e40af; --s: #16a34a; --d: #dc2626; --w: #d97706; --bg: #f1f5f9; --txt: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--txt); line-height: 1.5; }
        .btn { border: none; border-radius: 12px; padding: 14px 20px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 15px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-p { background: var(--p); color: #fff; }
        .btn-s { background: var(--s); color: #fff; }
        .btn-ghost { background: #e2e8f0; color: #475569; }
        .input { width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid #cbd5e1; font-size: 16px; margin-bottom: 15px; outline: none; transition: 0.2s; }
        .input:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1); }
        .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e2e8f0; display: flex; padding: 10px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; border: none; background: none; font-size: 11px; font-weight: 600; color: #64748b; cursor: pointer; display: flex; flexDirection: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--p); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; font-weight: 800; color: var(--p); }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // 🔗 CONFIGURAÇÃO SUPABASE
    const SUPABASE_URL = 'https://kqllnugiitlqqdwurafk.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxbGxudWdpaXRscXFkd3VyYWZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyMjc0OTksImV4cCI6MjA5OTgwMzQ5OX0.E_iLphEre9LQqhflbo9rZ0mT729a-BGFPC7RbNSpR8Q';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ==========================================
    // 🔐 COMPONENTE DE LOGIN
    // ==========================================
    function LoginView({ onLogin }) {
        const [email, setEmail] = useState('');
        const [pass, setPass] = useState('');
        const [loading, setLoading] = useState(false);

        const handleLogin = async () => {
            setLoading(true);
            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Erro: " + error.message);
            else onLogin(data.user);
            setLoading(false);
        };

        return (
            <div style={{ padding: 40, minHeight: '100vh', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                <div style={{ textAlign: 'center', marginBottom: 40 }}>
                    <h1 style={{ fontSize: 32, fontWeight: 900, color: '#1e40af' }}>SmartCaçamba</h1>
                    <p style={{ color: '#64748b' }}>Gestão Inteligente de Resíduos</p>
                </div>
                <input className="input" type="email" placeholder="E-mail" value={email} onChange={e=>setEmail(e.target.value)} />
                <input className="input" type="password" placeholder="Senha" value={pass} onChange={e=>setPass(e.target.value)} />
                <button className="btn btn-p" onClick={handleLogin} disabled={loading}>
                    {loading ? 'Entrando...' : 'Entrar na Plataforma'}
                </button>
            </div>
        );
    }

    // ==========================================
    // 🚛 REGISTRO DE SAÍDA (OBRA)
    // ==========================================
    function RegisterDeparture() {
        const [plate, setPlate] = useState('');
        const [driver, setDriver] = useState('');
        const [volume, setVolume] = useState('10');
        const [loading, setLoading] = useState(false);

        const handleRegister = async () => {
            if (!plate || !driver) return alert("Preencha placa e motorista!");
            setLoading(true);
            // Lógica Simplificada para MVP
            const voucherId = 'SC-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            const { error } = await supabase.from('vouchers').insert({
                id: voucherId,
                plate: plate.toUpperCase(),
                driver_name: driver,
                volume_declared: parseFloat(volume),
                status: 'awaiting'
            });
            
            if (error) alert(error.message);
            else {
                alert(`Vale Gerado: ${voucherId}`);
                setPlate(''); setDriver('');
            }
            setLoading(false);
        };

        return (
            <div style={{ padding: 20 }}>
                <h2 style={{ marginBottom: 20 }}>Registrar Saída</h2>
                <div className="card">
                    <label style={{ fontSize: 13, fontWeight: 700 }}>PLACA DO VEÍCULO</label>
                    <input className="input" placeholder="ABC-1234" value={plate} onChange={e=>setPlate(e.target.value)} />
                    <label style={{ fontSize: 13, fontWeight: 700 }}>NOME DO MOTORISTA</label>
                    <input className="input" placeholder="Nome Completo" value={driver} onChange={e=>setDriver(e.target.value)} />
                    <label style={{ fontSize: 13, fontWeight: 700 }}>VOLUME ESTIMADO (m³)</label>
                    <select className="input" value={volume} onChange={e=>setVolume(e.target.value)}>
                        <option value="5">5 m³</option>
                        <option value="10">10 m³</option>
                        <option value="20">20 m³</option>
                    </select>
                    <button className="btn btn-p" onClick={handleRegister} disabled={loading}>
                        {loading ? 'Gerando...' : 'GERAR VALE DE SAÍDA'}
                    </button>
                </div>
            </div>
        );
    }

    // ==========================================
    // 📊 APP PRINCIPAL
    // ==========================================
    function App() {
        const [user, setUser] = useState(null);
        const [view, setView] = useState('departure');

        useEffect(() => {
            supabase.auth.getSession().then(({ data: { session } }) => setUser(session?.user || null));
        }, []);

        if (!user) return <LoginView onLogin={setUser} />;

        return (
            <div style={{ paddingBottom: 80 }}>
                {view === 'departure' && <RegisterDeparture />}
                {view === 'vouchers' && <div style={{padding:20}}><h2>Histórico em Breve</h2></div>}
                
                <nav className="nav-bottom">
                    <button className={`nav-item ${view==='departure'?'active':''}`} onClick={()=>setView('departure')}>
                        <span style={{fontSize:24}}>🚛</span> Saída
                    </button>
                    <button className={`nav-item ${view==='vouchers'?'active':''}`} onClick={()=>setView('vouchers')}>
                        <span style={{fontSize:24}}>📋</span> Vales
                    </button>
                    <button className="nav-item" onClick={()=>supabase.auth.signOut()}>
                        <span style={{fontSize:24}}>🚪</span> Sair
                    </button>
                </nav>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
